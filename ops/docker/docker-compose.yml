# Local + staging compose for RCX-Registry.
#
# Usage:
#   cd ops/docker
#   cp .env.example .env   # edit before first boot
#   docker compose up -d --build
#
# Notes:
#  * Postgres is also Chainguard (cgr.dev/chainguard/postgres:latest).
#  * The server image runs migrations on boot when
#    `RCX_REGISTRY_RUN_MIGRATIONS=true` (default).
#  * Caddy is optional — leave commented out for local dev. Production
#    fronts the server at registry.rcxprotocol.org via the Caddyfile in
#    ops/caddy/Caddyfile.

services:
  postgres:
    image: cgr.dev/chainguard/postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rcx_registry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rcx_registry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rcx_registry} -d ${POSTGRES_DB:-rcx_registry}"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      # Bound to localhost only — production should remove this entirely.
      - "127.0.0.1:5432:5432"

  rcx-registry-server:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RCX_REGISTRY_BIND: 0.0.0.0:3030
      DATABASE_URL: postgres://${POSTGRES_USER:-rcx_registry}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rcx_registry}
      RCX_REGISTRY_RUN_MIGRATIONS: "true"
      MCP_REGISTRY_BASE_URL: ${MCP_REGISTRY_BASE_URL:-https://registry.modelcontextprotocol.io}
      RCX_REGISTRY_SYNC_INTERVAL_SECS: ${RCX_REGISTRY_SYNC_INTERVAL_SECS:-3600}
      RCX_REGISTRY_MIN_INTERVAL_FLOOR_SECS: ${RCX_REGISTRY_MIN_INTERVAL_FLOOR_SECS:-600}
      FEATURE_RCX_REGISTRY: ${FEATURE_RCX_REGISTRY:-false}
      FEATURE_RCX_REGISTRY_PUBLISHER_DECLARATIONS: ${FEATURE_RCX_REGISTRY_PUBLISHER_DECLARATIONS:-false}
      FEATURE_RCX_REGISTRY_ATTESTATIONS: ${FEATURE_RCX_REGISTRY_ATTESTATIONS:-false}
      FEATURE_RCX_REGISTRY_PROTOCOL_INTEGRATION: ${FEATURE_RCX_REGISTRY_PROTOCOL_INTEGRATION:-false}
      FEATURE_RCX_REGISTRY_SIGNED_CURSORS: ${FEATURE_RCX_REGISTRY_SIGNED_CURSORS:-false}
      RCX_REGISTRY_SIGNER_KID: ${RCX_REGISTRY_SIGNER_KID:-vault:transit:rcx-registry-signing-key-1}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_TRANSIT_KEY_NAME: ${VAULT_TRANSIT_KEY_NAME:-rcx-registry-signing-key-1}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_SCOPE: ${GITHUB_OAUTH_SCOPE:-read:user}
      RCX_REGISTRY_DNS_USE_SYSTEM_RESOLVER: ${RCX_REGISTRY_DNS_USE_SYSTEM_RESOLVER:-false}
      RUST_LOG: ${RUST_LOG:-info,rcx_registry_server=debug}
    ports:
      - "127.0.0.1:3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
